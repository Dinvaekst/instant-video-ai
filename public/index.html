<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Video AI</title>

  <meta name="robots" content="noindex,nofollow" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#050505;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    .bg{
      position:fixed;
      width:900px;
      height:900px;
      border-radius:50%;
      background:rgba(186,255,74,.16);
      filter:blur(140px);
      top:-300px;
      left:-200px;
    }

    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
    }

    .card{
      width:430px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      backdrop-filter:blur(20px);
    }

    h1{
      font-size:42px;
      margin-bottom:12px;
    }

    p{
      color:#b4b4b4;
      line-height:1.5;
      margin-bottom:24px;
    }

    input,
    textarea{
      width:100%;
      padding:17px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#181818;
      color:white;
      font-size:16px;
      margin-bottom:14px;
    }

    textarea{
      height:110px;
      resize:none;
    }

    button{
      width:100%;
      padding:17px;
      border:none;
      border-radius:18px;
      background:#baff4a;
      color:black;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
    }

    .hidden{
      display:none;
    }

    .dashboard{
      width:100%;
      max-width:1150px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:28px;
    }

    .logo{
      font-size:28px;
      font-weight:900;
    }

    .logo span{
      color:#baff4a;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:22px;
    }

    .panel{
      padding:28px;
      border-radius:28px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
    }

    .panel h2{
      font-size:32px;
      margin-bottom:10px;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:14px;
    }

    .secondary{
      background:#202020;
      color:white;
      border:1px solid rgba(255,255,255,.1);
    }

    .preview{
      height:430px;
      border-radius:26px;
      background:linear-gradient(180deg,#171717,#0b0b0b);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#aaa;
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      padding:18px;
    }

    .status{
      margin-top:16px;
      padding:16px;
      border-radius:18px;
      background:#111;
      color:#baff4a;
      font-weight:800;
    }

    .mini{
      font-size:13px;
      color:#888;
      margin-top:12px;
    }

    video{
      width:100%;
      height:100%;
      border-radius:22px;
      object-fit:cover;
    }

    .download-btn{
      margin-top:16px;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <div class="card" id="loginBox">
    <h1>Instant Video AI 🚀</h1>

    <p>
      Private AI ad generator system.
    </p>

    <input
      type="password"
      id="password"
      placeholder="Enter access code"
    />

    <button onclick="login()">
      Access Platform
    </button>
  </div>

  <div class="dashboard hidden" id="appBox">

    <div class="top">
      <div class="logo">
        Instant <span>Video AI</span>
      </div>

      <button
        class="secondary"
        style="width:150px"
        onclick="logout()"
      >
        Logout
      </button>
    </div>

    <div class="grid">

      <div class="panel">

        <h2>Create video</h2>

        <p>
          Generate short-form ads for Instant Answer.
        </p>

        <input
          id="topic"
          placeholder="Video idea..."
        />

        <textarea
          id="script"
          placeholder="Optional hook or script..."
        ></textarea>

        <button onclick="generateVideo()">
          Generate TikTok Ad
        </button>

        <div class="actions">
          <button
            class="secondary"
            onclick="setStyle('TikTok')"
          >
            TikTok
          </button>

          <button
            class="secondary"
            onclick="setStyle('Reel')"
          >
            Reel
          </button>

          <button
            class="secondary"
            onclick="setStyle('Short')"
          >
            Short
          </button>
        </div>

        <div class="status" id="status">
          Ready
        </div>

        <div class="mini">
          AI render system connected.
        </div>

      </div>

      <div class="panel">

        <h2>Preview</h2>

        <div class="preview" id="preview">
          Your generated video will appear here.
        </div>

      </div>

    </div>

  </div>

</div>

<script>

const ACCESS_CODE = "mgg2026";

let selectedStyle = "TikTok";

function login(){

  const value =
    document.getElementById("password").value;

  if(value === ACCESS_CODE){

    localStorage.setItem(
      "iva_access",
      "true"
    );

    showApp();

  }else{

    alert("Wrong access code");

  }
}

function logout(){

  localStorage.removeItem(
    "iva_access"
  );

  location.reload();
}

function showApp(){

  document
    .getElementById("loginBox")
    .classList.add("hidden");

  document
    .getElementById("appBox")
    .classList.remove("hidden");
}

function setStyle(style){

  selectedStyle = style;

  document.getElementById(
    "status"
  ).innerText =
    style + " mode selected";
}

async function generateVideo(){

  const topic =
    document.getElementById("topic").value ||
    "Instant Answer AI";

  document.getElementById(
    "status"
  ).innerText =
    "Generating video...";

  document.getElementById(
    "preview"
  ).innerHTML = `
    <div style="
      color:white;
      font-size:28px;
      font-weight:800;
    ">
      Rendering your video...
    </div>
  `;

  try{

    const response = await fetch(
      "https://instant-video-ai-backend.onrender.com/generate",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          topic,
          style:selectedStyle
        })
      }
    );

    const data = await response.json();

    if(data.success){

      document.getElementById(
        "status"
      ).innerText =
        "Video generated successfully ✅";

      document.getElementById(
        "preview"
      ).innerHTML = `

        <div style="width:100%">

          <video controls autoplay>

            <source
              src="https://instant-video-ai-backend.onrender.com${data.videoUrl}"
              type="video/mp4"
            />

          </video>

          <a
            href="http://localhost:3000${data.videoUrl}"
            download
          >
            <button class="download-btn">
              Download MP4
            </button>
          </a>

        </div>

      `;

    }else{

      document.getElementById(
        "status"
      ).innerText =
        "Generation failed";

    }

  }catch(error){

    console.error(error);

    document.getElementById(
      "status"
    ).innerText =
      "Server error";

  }
}

if(
  localStorage.getItem("iva_access")
  === "true"
){
  showApp();
}

</script>

</body>
</html>
